info:
  name: Create
  type: http
  seq: 1

http:
  method: POST
  url: "{{HOST}}/v1/product/create"
  body:
    type: json
    data: |-
      [
        {
          "name": "",
          "description": "",
          "price": 1000.00,
          "category": "",
          "stock": 10,
          "images": ["www.example.com/image1","www.example.com/image2"],
          "isActive": true
        }
      ]
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
