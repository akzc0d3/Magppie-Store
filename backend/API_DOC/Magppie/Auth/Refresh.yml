info:
  name: Refresh
  type: http
  seq: 3

http:
  method: POST
  url: "{{HOST}}/v1/auth/refresh"
  headers:
    - name: ""
      value: ""

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          bru.setVar("ACCESS_TOKEN", res.body.data.accessToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
