info:
  name: Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{HOST}}/v1/auth/login"
  body:
    type: form-urlencoded
    data:
      - name: email
        value: ""
      - name: password
        value: ""
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() === 200) {
          bru.setVar("ACCESS_TOKEN", res.body.data.accessToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
