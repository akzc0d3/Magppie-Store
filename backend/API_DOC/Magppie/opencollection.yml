opencollection: 1.0.0

info:
  name: Magppie
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{ACCESS_TOKEN}}"
  variables:
    - name: HOST
      value: http://localhost:8000
    - name: ACCESS_TOKEN
      value: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
